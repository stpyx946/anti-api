name: windows-winget-package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package (without leading v). Defaults to package.json version."
        required: false
        type: string
      upload_to_release:
        description: "Upload the generated zip to the matching GitHub release tag."
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Rust proxy
        run: cargo build --release --manifest-path rust-proxy/Cargo.toml

      - name: Build WinGet bundle
        run: bun run winget:bundle -- ${{ steps.version.outputs.version }} x64

      - name: Compress portable package
        shell: pwsh
        run: |
          $bundleDir = "dist/winget-x64/anti-api"
          $zipPath = "dist/anti-api-winget-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$bundleDir" -DestinationPath $zipPath -Force

      - name: Generate SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path "dist/anti-api-winget-x64.zip" -Algorithm SHA256).Hash.ToUpper()
          Set-Content -Path "dist/anti-api-winget-x64.zip.sha256" -Value $hash -NoNewline

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: anti-api-winget-x64
          path: |
            dist/anti-api-winget-x64.zip
            dist/anti-api-winget-x64.zip.sha256

      - name: Upload to GitHub release
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" \
            dist/anti-api-winget-x64.zip \
            dist/anti-api-winget-x64.zip.sha256 \
            --clobber
